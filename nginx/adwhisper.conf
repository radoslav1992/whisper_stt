server {
    server_name whisperstt.com www.whisperstt.com;

    root /var/www/adwhisper/dist;
    index index.html;

    # Handle clean URLs — Astro generates /transcribe/index.html for /transcribe
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|wasm)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Allow large audio/video uploads (processed client-side)
    client_max_body_size 500M;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    listen 80;
}
